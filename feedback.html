<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户支持与反馈 - Syncscribe</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 720px; margin: 0 auto; padding: 24px; line-height: 1.6; color: #333; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        p { margin: 12px 0; }
        .meta { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
        a { color: #007AFF; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn { display: inline-block; background: #007AFF; color: #fff; padding: 12px 24px; border-radius: 10px; margin: 8px 8px 8px 0; font-weight: 500; }
        .btn:hover { background: #0056b3; color: #fff; text-decoration: none; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; color: #333; }
        .lang-switch { margin-bottom: 20px; font-size: 0.9rem; }
        .lang-switch a { margin-right: 12px; }
        .lang-switch a.active { font-weight: 600; color: #333; }
        .options { margin-top: 24px; }
    </style>
</head>
<body>
    <div class="lang-switch"><a href="feedback.html" class="active">中文</a> | <a href="feedback-en.html">English</a></div>

    <h1>用户支持与反馈</h1>
    <p class="meta">Syncscribe · 我们重视您的每一条反馈</p>

    <p>遇到问题或有改进建议？欢迎通过以下方式与我们联系：</p>

    <div class="options">
        <p><strong>1. GitHub Issues（推荐）</strong></p>
        <p>在 GitHub 提交 Issue，便于我们跟踪和处理。请尽量描述问题现象、复现步骤或建议内容。</p>
        <a href="https://github.com/dobestforyou/Syncscribe/issues/new" class="btn" target="_blank" rel="noopener">提交反馈 / 报告问题</a>

        <p style="margin-top: 24px;"><strong>2. 查看帮助文档</strong></p>
        <p>使用中遇到疑问，可先查阅帮助文档，多数常见问题已有说明。</p>
        <a href="help.html" class="btn btn-secondary">查看帮助</a>
    </div>

    <p style="margin-top: 32px;"><a href="index.html">← 返回首页</a></p>
</body>
</html>
