<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncscribe 支持中心</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 720px; margin: 0 auto; padding: 24px; line-height: 1.6; color: #333; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        p { margin: 12px 0; }
        .meta { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        .lang-switch { margin: 12px 0 20px; font-size: 0.95rem; }
        .lang-switch a { margin-right: 12px; color: #007AFF; text-decoration: none; }
        .lang-switch a:hover { text-decoration: underline; }
        .btn { display: inline-block; background: #007AFF; color: #fff; padding: 12px 24px; border-radius: 10px; margin: 8px 8px 8px 0; font-weight: 500; text-decoration: none; }
        .btn:hover { background: #0056b3; color: #fff; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; color: #333; }
    </style>
</head>
<body>
    <h1>Syncscribe 支持中心</h1>
    <p class="meta">联系方式、帮助与反馈</p>
    <p>使用过程中如有问题、建议或功能请求，可通过以下渠道联系我们。</p>

    <div class="lang-switch">
        语言切换：
        <a href="feedback.html">中文支持页面</a>
        <a href="feedback-en.html">English Support Page</a>
    </div>

    <p><strong>快速支持入口</strong></p>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSc6-ut9fRi2aUfPA_ClniOWpoJa--3kKrTK41SsaK61GGJ32w/viewform" class="btn" target="_blank" rel="noopener">打开反馈表单</a>
    <a href="https://github.com/dobestforyou/Syncscribe/issues/new" class="btn" target="_blank" rel="noopener">通过 GitHub Issues 反馈</a>
    <a href="help.html" class="btn btn-secondary">查看帮助文档</a>
    <p>通常响应时间：24-48 小时（工作日）。</p>
</body>
</html>
